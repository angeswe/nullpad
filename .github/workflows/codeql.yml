name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
        with:
          category: /language:${{ matrix.language }}

  dismiss-false-positives:
    name: Dismiss False Positives
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - name: Dismiss known false positives
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // Known false positive: rust/path-injection in blob.rs
            // Our code uses sanitize_blob_id (allows only [A-Za-z0-9_-]) plus
            // strip_prefix verification, making path traversal impossible.
            const knownFalsePositives = [
              { ruleId: 'rust/path-injection', pathPattern: /^src\/storage\/blob\.rs$/ }
            ];

            // Fetch all non-dismissed alerts (includes state: null for pending PR alerts)
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const openAlerts = alerts.filter(a => a.state !== 'dismissed' && a.state !== 'fixed');

            for (const alert of openAlerts) {
              const location = alert.most_recent_instance?.location;
              if (!location) continue;

              for (const fp of knownFalsePositives) {
                if (alert.rule.id === fp.ruleId && fp.pathPattern.test(location.path)) {
                  console.log(`Dismissing alert #${alert.number}: ${alert.rule.id} at ${location.path}:${location.start_line}`);
                  await github.rest.codeScanning.updateAlert({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    alert_number: alert.number,
                    state: 'dismissed',
                    dismissed_reason: 'false positive',
                    dismissed_comment: 'Auto-dismissed: sanitize_blob_id validates [A-Za-z0-9_-] only, canonicalize_storage_root + strip_prefix verification'
                  });
                }
              }
            }
