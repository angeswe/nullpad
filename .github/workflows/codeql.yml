name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:${{ matrix.language }}

  dismiss-false-positives:
    name: Dismiss False Positives
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - name: Dismiss known false positives
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const knownFalsePositives = [
              { ruleId: 'rust/path-injection', pathPattern: /^src\/storage\/blob\.rs$/, comment: 'sanitize_blob_id validates [A-Za-z0-9_-] only, canonicalize_storage_root + strip_prefix verification' },
              { ruleId: 'rust/hard-coded-cryptographic-value', pathPattern: /^tests\//, comment: 'Test-only dummy keys with no security impact' }
            ];

            // Fetch all non-dismissed alerts (includes state: null for pending PR alerts)
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const openAlerts = alerts.filter(a => a.state !== 'dismissed' && a.state !== 'fixed');

            for (const alert of openAlerts) {
              const location = alert.most_recent_instance?.location;
              if (!location) continue;

              for (const fp of knownFalsePositives) {
                if (alert.rule.id === fp.ruleId && fp.pathPattern.test(location.path)) {
                  console.log(`Dismissing alert #${alert.number}: ${alert.rule.id} at ${location.path}:${location.start_line}`);
                  await github.rest.codeScanning.updateAlert({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    alert_number: alert.number,
                    state: 'dismissed',
                    dismissed_reason: 'false positive',
                    dismissed_comment: `Auto-dismissed: ${fp.comment}`
                  });
                }
              }
            }
