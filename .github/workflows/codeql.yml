name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:${{ matrix.language }}

  dismiss-false-positives:
    name: Dismiss False Positives
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - name: Dismiss known false positives
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const knownFalsePositives = [
              { ruleId: 'rust/path-injection', pathPattern: /^src\/storage\/blob\.rs$/, comment: 'sanitize_blob_id validates [A-Za-z0-9_-] only, canonicalize_storage_root + strip_prefix verification' },
              { ruleId: 'rust/hard-coded-cryptographic-value', pathPattern: /^tests\//, comment: 'Test-only dummy keys with no security impact' }
            ];

            // Fetch all non-dismissed alerts (includes state: null for pending PR alerts)
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            const openAlerts = alerts.filter(a => a.state !== 'dismissed' && a.state !== 'fixed');

            for (const alert of openAlerts) {
              const location = alert.most_recent_instance?.location;
              if (!location) continue;

              for (const fp of knownFalsePositives) {
                if (alert.rule.id === fp.ruleId && fp.pathPattern.test(location.path)) {
                  console.log(`Dismissing alert #${alert.number}: ${alert.rule.id} at ${location.path}:${location.start_line}`);
                  await github.rest.codeScanning.updateAlert({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    alert_number: alert.number,
                    state: 'dismissed',
                    dismissed_reason: 'false positive',
                    dismissed_comment: `Auto-dismissed: ${fp.comment}`
                  });
                }
              }
            }
