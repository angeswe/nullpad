name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-06; action has no release tags — dependabot bumps this pin
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Start Redis with authentication
        run: |
          docker run -d --name redis -p 6379:6379 \
            redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065 \
            redis-server --requirepass ci-test-pass
          for i in $(seq 1 30); do
            if docker exec redis redis-cli -a ci-test-pass ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            sleep 1
          done
      - name: Verify vendor JS hashes and SRI attributes
        run: bash tools/verify-vendor.sh
      - name: Unit tests
        run: cargo test --locked --lib
        env:
          REDIS_URL: redis://:ci-test-pass@127.0.0.1:6379
      - name: Integration tests (sequential, shared Redis)
        run: cargo test --locked --test integration -- --test-threads=1
        env:
          REDIS_URL: redis://:ci-test-pass@127.0.0.1:6379

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-06; action has no release tags — dependabot bumps this pin
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - run: cargo fmt --check
      - run: cargo clippy --locked -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build image
        run: docker build -t nullpad:scan .
      - name: Trivy vulnerability scan # no trivy-action — supply chain compromised twice (2025, 2026)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.69.3@sha256:7228e304ae0f610a1fad937baa463598cadac0c2ac4027cc68f3a8b997115689 \
            image --exit-code 1 --severity CRITICAL,HIGH \
            --ignore-unfixed --format table \
            nullpad:scan
