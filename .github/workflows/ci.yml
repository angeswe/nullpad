name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-06; action has no release tags — dependabot bumps this pin
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Start Valkey with authentication
        run: |
          docker run -d --name valkey -p 6379:6379 \
            valkey/valkey:9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd \
            valkey-server --requirepass ci-test-pass
          for i in $(seq 1 30); do
            if docker exec valkey valkey-cli -a ci-test-pass ping 2>/dev/null | grep -q PONG; then
              echo "Valkey is ready"
              break
            fi
            sleep 1
          done
      - name: Verify vendor JS hashes and SRI attributes
        run: bash tools/verify-vendor.sh
      - name: Unit tests
        run: cargo test --locked --lib
        env:
          VALKEY_URL: redis://:ci-test-pass@127.0.0.1:6379
      - name: Integration tests (sequential, shared Valkey)
        run: cargo test --locked --test integration -- --test-threads=1
        env:
          VALKEY_URL: redis://:ci-test-pass@127.0.0.1:6379

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-06; action has no release tags — dependabot bumps this pin
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo fmt --check
      - run: cargo clippy --locked -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build image
        run: docker build -t nullpad:scan .
      - name: Trivy vulnerability scan # no trivy-action — supply chain compromised twice (2025, 2026)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:0.69.3@sha256:7228e304ae0f610a1fad937baa463598cadac0c2ac4027cc68f3a8b997115689 \
            image --exit-code 1 --severity CRITICAL,HIGH \
            --ignore-unfixed --format table \
            nullpad:scan
