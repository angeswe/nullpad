services:
  nullpad:
    build: .
    ports:
      - "3015:3000"
    depends_on:
      valkey:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - VALKEY_URL=redis://:${VALKEY_PASSWORD:?VALKEY_PASSWORD must be set}@valkey:6379
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./static:/app/static:ro
      - paste-data:/data/pastes
    tmpfs:
      - /tmp

  valkey:
    # To update: docker pull valkey/valkey:9.1.0-alpine && docker inspect --format='{{index .RepoDigests 0}}' valkey/valkey:9.1.0-alpine
    image: valkey/valkey:9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    user: valkey
    volumes:
      - valkey-data:/data
    env_file:
      - .env
    restart: unless-stopped
    # NOTE: AOF persistence means burn-after-reading pastes persist in the AOF
    # file until rewrite. Aggressive rewrite settings below minimize this window.
    # For stronger burn guarantees, disable AOF (--appendonly no --save "").
    command: >-
      sh -c 'valkey-server --appendonly yes
      --auto-aof-rewrite-percentage 50
      --auto-aof-rewrite-min-size 16mb
      --requirepass "$$VALKEY_PASSWORD"
      --maxmemory "$${VALKEY_MAXMEMORY:-2gb}"
      --maxmemory-policy volatile-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""'
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$VALKEY_PASSWORD\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    read_only: true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

networks:
  internal:
    driver: bridge

volumes:
  valkey-data:
  paste-data:
