services:
  nullpad:
    build: .
    ports:
      - "3015:3000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./static:/app/static:ro
      - paste-data:/data/pastes
    tmpfs:
      - /tmp

  redis:
    # To update: docker pull redis:7-alpine && docker inspect --format='{{index .RepoDigests 0}}' redis:7-alpine
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    user: redis
    volumes:
      - redis-data:/data
    env_file:
      - .env
    restart: unless-stopped
    # NOTE: AOF persistence means burn-after-reading pastes persist in the AOF
    # file until rewrite. Aggressive rewrite settings below minimize this window.
    # For stronger burn guarantees, disable AOF (--appendonly no --save "").
    command: >-
      sh -c 'redis-server --appendonly yes
      --auto-aof-rewrite-percentage 50
      --auto-aof-rewrite-min-size 16mb
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory "$${REDIS_MAXMEMORY:-2gb}"
      --maxmemory-policy volatile-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    read_only: true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
  paste-data:
